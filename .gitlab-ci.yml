stages:
  - mirror

default:
  image: alpine:3.21

.github_mirror:
  stage: mirror
  resource_group: github-mirror
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apk add --no-cache bash git openssh-client

mirror_github_main:
  extends: .github_mirror
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - ./scripts/push-github-mirror.sh branch "$CI_DEFAULT_BRANCH"

mirror_github_tag:
  extends: .github_mirror
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG'
  script:
    - ./scripts/push-github-mirror.sh tag "$CI_COMMIT_TAG"
