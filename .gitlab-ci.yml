stages:
  - test
  - mirror
  - deploy

default:
  tags:
    - groundstation

include:
  - component: $CI_SERVER_FQDN/to-be-continuous/gitleaks/gitlab-ci-gitleaks@2.10.0
  - component: gitlab.com/gabriel.chamon/ci-components/orisun-gitlab@v1
    inputs:
      job_name: sync_issues
      job_stage: deploy
      mode: sync
